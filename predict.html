<!DOCTYPE html>
<html lang="en">
<head>
    <title>GuardAI - Predict</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f1f5f9; }
        .form-container { max-width: 600px; margin: 50px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #e2e8f0; }
        .btn-submit { background: #0f172a; color: white; border-radius: 10px; padding: 12px; width: 100%; transition: 0.3s; }
        .btn-submit:hover { background: #334155; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <h2 class="fw-bold mb-4 text-center">Transaction Analysis</h2>
        <form action="/submit" method="POST">
            <div class="mb-3">
                <label class="form-label text-muted">Transaction Type</label>
                <select class="form-select" name="type">
                    <option value="PAYMENT">Payment</option>
                    <option value="TRANSFER">Transfer</option>
                    <option value="CASH_OUT">Cash Out</option>
                    <option value="CASH_IN">Cash In</option>
                    <option value="DEBIT">Debit</option>
                </select>
            </div>
            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="form-label text-muted">Amount ($)</label>
                    <input type="number" name="amount" class="form-control" placeholder="0.00" required step="any">
                </div>
            </div>
            <hr>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label text-muted">Old Balance (Sender)</label>
                    <input type="number" name="oldbalanceOrg" class="form-control" required step="any">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label text-muted">New Balance (Sender)</label>
                    <input type="number" name="newbalanceOrig" class="form-control" required step="any">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label text-muted">Old Balance (Receiver)</label>
                    <input type="number" name="oldbalanceDest" class="form-control" required step="any">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label text-muted">New Balance (Receiver)</label>
                    <input type="number" name="newbalanceDest" class="form-control" required step="any">
                </div>
            </div>
            <button type="submit" class="btn btn-submit mt-3 fw-bold">Analyze Transaction</button>
        </form>
    </div>
</div>

</body>
</html>
