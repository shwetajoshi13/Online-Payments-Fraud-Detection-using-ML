<!DOCTYPE html>
<html>
<head>
    <title>Analysis Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { background: #f8fafc; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .result-card { background: white; padding: 50px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; max-width: 500px; }
        .icon-circle { width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 40px; }
        .bg-fraud { background: #fee2e2; color: #ef4444; }
        .bg-legit { background: #dcfce7; color: #22c55e; }
    </style>
</head>
<body>

<div class="result-card animate__animated animate__zoomIn">
    {% if result_class == 'fraud' %}
        <div class="icon-circle bg-fraud animate__animated animate__headShake">⚠️</div>
        <h1 class="fw-bold text-danger">Fraud Alert!</h1>
        <p class="text-muted">Our AI detected high-risk patterns in this transaction. Security action recommended.</p>
    {% else %}
        <div class="icon-circle bg-legit">✅</div>
        <h1 class="fw-bold text-success">Verified Secure</h1>
        <p class="text-muted">The transaction appears normal and aligns with safe financial behavior.</p>
    {% endif %}
    
    <hr>
    <p class="small text-muted">Analysis by GuardAI Engine v1.0</p>
    <a href="/predict" class="btn btn-dark px-4 py-2 mt-3">New Analysis</a>
</div>

</body>
</html>
